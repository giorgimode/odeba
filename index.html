<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odeba</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #7c6af7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 1.5rem;
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--text);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .hero-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    .cta:hover {
      opacity: 0.85;
    }

    footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">Odeba</a>
    <nav>
      <a href="#">About</a>
      <a href="#">Work</a>
      <a href="mailto:contact@odeba.net">Contact</a>
    </nav>
  </header>

  <main>
    <p class="hero-label">Coming soon</p>
    <h1>Something is<br>being built.</h1>
    <p class="subtitle">More details on the way. Check back soon.</p>
    <a href="mailto:contact@odeba.net" class="cta">Get in touch</a>
  </main>

  <footer>
    &copy; 2026 Odeba
  </footer>

</body>
</html>
